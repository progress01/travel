<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GA 新聞報表自動化工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; color: #333; text-align: center; border-bottom: 2px solid #4CAF50; padding-bottom: 10px; }
        .section { background-color: #f9fdf9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #dcdcdc; }
        .section-title { font-weight: bold; font-size: 18px; color: #2E7D32; margin-bottom: 10px; }
        label { font-weight: bold; font-size: 14px; color: #444; }
        input[type="text"], textarea { width: 100%; padding: 8px; margin-top: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 120px; resize: vertical; }
        input[type="file"] { font-size: 16px; margin-top: 10px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 15px; font-weight: bold; color: white; transition: 0.3s; }
        .btn-primary { background-color: #4CAF50; }
        .btn-primary:hover { background-color: #45a049; }
        .btn-secondary { background-color: #FF9800; }
        .btn-secondary:hover { background-color: #e68a00; }
        .copy-btn { background-color: #008CBA; display: none; margin-top: 20px; width: 100%; }
        .copy-btn:hover { background-color: #007399; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #4CAF50; color: white; }
        td.title-col { text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 GA 新聞報表自動化工具</h1>
    
    <div class="section">
        <div class="section-title">步驟一：上傳 GA 資料與設定</div>
        <label>🛑 要排除的網頁標題關鍵字 (半形逗號分隔)：</label>
        <input type="text" id="excludeKeywords" value="首頁, 網站導覽, 找不到網頁, Page Not Found">
        
        <label style="display:block; margin-top:15px;">📁 上傳 GA 匯出的原始資料 (.xlsx 或 .csv)：</label>
        <input type="file" id="fileUpload" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" />
        <p id="uploadStatus" style="color: #d32f2f; font-weight: bold; font-size: 14px;">尚未上傳資料</p>
    </div>

    <div class="section">
        <div class="section-title">步驟二：選擇你要產生的報表</div>
        
        <div style="margin-bottom: 20px;">
            <label>📋 模式 A：產出全站熱門 Top 30</label><br>
            <button class="btn-primary" onclick="generateTop30()" style="margin-top: 5px;">產生 Top 30 報表</button>
        </div>

        <hr style="border: 0; border-top: 1px dashed #ccc; margin: 20px 0;">

        <div>
            <label>🎯 模式 B：本週發布新聞比對 (貼上你要找的新聞標題，一行一個)</label>
            <textarea id="newsList" placeholder="請將本週發布的新聞標題貼在這裡...&#10;第一篇新聞標題&#10;第二篇新聞標題&#10;第三篇新聞標題"></textarea>
            <button class="btn-secondary" onclick="generateWeeklyMatch()" style="margin-top: 5px;">產生本週新聞比對報表</button>
        </div>
    </div>

    <button id="copyBtn" class="copy-btn" onclick="copyTable()">📋 點我一鍵複製下方表格</button>

    <div id="resultArea">
        </div>
</div>

<script>
    // 全域變數儲存解析後的 GA 資料
    let globalGAData = [];
    let globalTotalViews = 0;

    // 檔案上傳處理
    document.getElementById('fileUpload').addEventListener('change', function(e) {
        var files = e.target.files;
        if (files.length === 0) return;
        
        document.getElementById('uploadStatus').style.color = "#FF9800";
        document.getElementById('uploadStatus').innerText = "資料讀取中...";

        var f = files[0];
        var reader = new FileReader();

        reader.onload = function(e) {
            var data = new Uint8Array(e.target.result);
            var workbook = XLSX.read(data, {type: 'array'});
            var firstSheetName = workbook.SheetNames[0];
            var worksheet = workbook.Sheets[firstSheetName];
            var jsonData = XLSX.utils.sheet_to_json(worksheet, {defval: ""});
            
            processRawData(jsonData);
        };
        reader.readAsArrayBuffer(f);
    });

    // 預處理資料 (清洗、排除、排序、加總)
    function processRawData(data) {
        globalTotalViews = 0;
        let validRows = [];
        let excludeStr = document.getElementById('excludeKeywords').value;
        let excludeList = excludeStr.split(',').map(item => item.trim()).filter(item => item !== "");

        data.forEach(row => {
            let title = row["網頁標題"] || row["Page title"] || "";
            let views = row["瀏覽"] || row["Views"] || 0;
            let time = row["平均參與時間"] || row["Average engagement time"] || 0;

            let isExcluded = excludeList.some(keyword => title.includes(keyword));

            if (!isExcluded && title !== "" && !isNaN(views) && views !== "") {
                let viewCount = parseInt(views, 10);
                globalTotalViews += viewCount;
                validRows.push({
                    title: title.trim(),
                    views: viewCount,
                    time: parseFloat(time)
                });
            }
        });

        // 依照瀏覽量遞減排序，並賦予「流量排行」
        validRows.sort((a, b) => b.views - a.views);
        validRows.forEach((item, index) => {
            item.rank = index + 1; // 加上全站排名屬性
        });

        globalGAData = validRows;
        
        document.getElementById('uploadStatus').style.color = "#4CAF50";
        document.getElementById('uploadStatus').innerText = `✅ 讀取成功！共載入 ${globalGAData.length} 筆有效網頁資料。(總瀏覽量: ${globalTotalViews})`;
    }

    // 產生 Top 30 報表 (舊有功能)
    function generateTop30() {
        if (globalGAData.length === 0) { alert("請先上傳 GA 資料！"); return; }
        
        let top30 = globalGAData.slice(0, 30);
        let tableHTML = `
            <table id="reportTable">
                <thead><tr><th>排行</th><th>日期</th><th>單位</th><th>新聞標題</th><th>瀏覽次數/佔比</th><th>停留時間</th></tr></thead>
                <tbody>
        `;

        top30.forEach((item, index) => {
            let percentage = ((item.views / globalTotalViews) * 100).toFixed(2);
            tableHTML += `
                <tr>
                    <td>${index + 1}</td><td></td><td></td>
                    <td class="title-col">${item.title}</td>
                    <td>${item.views} (${percentage}%)</td>
                    <td>${Math.round(item.time)} 秒</td>
                </tr>
            `;
        });
        tableHTML += `</tbody></table>`;
        displayResult(tableHTML);
    }

    // 產生本週新聞比對報表 (全新功能！)
    function generateWeeklyMatch() {
        if (globalGAData.length === 0) { alert("請先上傳 GA 資料！"); return; }
        
        let newsInput = document.getElementById('newsList').value.trim();
        if (newsInput === "") { alert("請先在文字框貼上你要比對的新聞標題！"); return; }

        // 將輸入的文字依據換行符號切割成陣列
        let searchTitles = newsInput.split('\n').map(t => t.trim()).filter(t => t !== "");

        let tableHTML = `
            <table id="reportTable">
                <thead><tr><th>項次</th><th>日期</th><th>單位</th><th>新聞標題</th><th>瀏覽/佔比</th><th>流量排行</th><th>停留時間</th></tr></thead>
                <tbody>
        `;

        searchTitles.forEach((searchTitle, index) => {
            // 在 GA 資料中尋找標題相符的項目 (只要 GA 標題包含搜尋字串就算)
            let match = globalGAData.find(ga => ga.title.includes(searchTitle) || searchTitle.includes(ga.title));
            
            let viewsText = "0 (0.00%)";
            let rankText = "-";
            let timeText = "0 秒";

            if (match) {
                let percentage = ((match.views / globalTotalViews) * 100).toFixed(2);
                viewsText = `${match.views} (${percentage}%)`;
                rankText = match.rank; // 抓取全站排名
                timeText = `${Math.round(match.time)} 秒`;
            }

            tableHTML += `
                <tr>
                    <td>${index + 1}</td><td></td><td></td>
                    <td class="title-col">${searchTitle}</td>
                    <td>${viewsText}</td>
                    <td>${rankText}</td>
                    <td>${timeText}</td>
                </tr>
            `;
        });

        tableHTML += `</tbody></table>`;
        displayResult(tableHTML);
    }

    function displayResult(html) {
        document.getElementById('resultArea').innerHTML = html;
        document.getElementById('copyBtn').style.display = 'block';
    }

    function copyTable() {
        var table = document.getElementById("reportTable");
        var range = document.createRange();
        range.selectNode(table);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        try { document.execCommand('copy'); alert('表格已複製！'); } 
        catch (err) { alert('複製失敗，請手動框選複製。'); }
        window.getSelection().removeAllRanges();
    }
</script>

</body>
</html>
